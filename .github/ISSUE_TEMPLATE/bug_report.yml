name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps and commands.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Checks run
      description: Paste relevant output from audit or boundary checks.
      render: text
  - type: checkboxes
    id: boundary
    attributes:
      label: Open-source boundary
      options:
        - label: I did not include private paths, secrets, customer data, raw archives, or unredacted logs.
          required: true
